<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia Classifier | AI Medical Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <header>
        <h1>PnuemoCheck AI</h1>
        <p class="subtitle">Instant Chest X-Ray Analysis for Clinical Decision Support</p>
    </header>

    <div class="container">
        <div class="main-grid">
            <!-- Input Card -->
            <div class="card">
                <div class="card-title">🔍 Input Analysis</div>

                <div class="upload-area" id="drop-zone">
                    <p id="upload-text">📁 Drag & drop X-ray or Click to select</p>
                    <input type="file" id="image-upload" accept="image/*">
                    <img id="preview-img" alt="Preview">
                </div>

                <div style="margin: 2rem 0; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                    — OR SELECT A SAMPLE —
                </div>

                <div class="samples-gallery" id="samples-gallery">
                    <!-- Samples will be rendered here by script.js -->
                </div>

                <button class="btn" id="predict-btn" disabled onclick="handlePredict()">Run AI Prediction</button>
            </div>

            <!-- Result Card -->
            <div class="card">
                <div class="card-title">📊 Diagnosis Result</div>

                <div id="welcome-message" style="color: var(--text-muted); text-align: center; padding-top: 5rem;">
                    Upload an image or select a sample to begin analysis.
                </div>

                <div class="loader" id="loader"></div>

                <div id="result-display">
                    <div id="prediction-text" class="prediction-badge">NORMAL</div>
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">CONDFIDENCE SCORE
                    </div>
                    <div id="confidence-text" style="font-size: 1.5rem; font-weight: 700;">94.2%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidence-fill"></div>
                    </div>
                    <p id="message-text" style="color: var(--text-muted); line-height: 1.6; margin-top: 1rem;"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="static/script.js"></script>
</body>

</html>
